name: Theorem Prover CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lean4-mathlib:
    name: Lean 4 + mathlib verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Show Lean version
        run: |
          lean --version || true
          lake --version || true

      - name: Cache Lean packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
            lake-packages
          key: ${{ runner.os }}-lean-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lean-

      - name: Resolve dependencies
        run: |
          if [ -f lakefile.lean ] || [ -f lakefile.toml ]; then
            lake update
          else
            echo "No lakefile found; skipping dependency resolution"
          fi

      - name: Build Lean project
        run: |
          if [ -f lakefile.lean ] || [ -f lakefile.toml ]; then
            lake build
          else
            echo "No Lean project scaffold found" && exit 1
          fi

  coq:
    name: Coq verification scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq
      - name: Build Coq files if present
        run: |
          if find . -name '*.v' | grep -q .; then
            echo "Coq files detected"
            find . -name '*.v' -print
            echo "Add _CoqProject or Makefile for full deterministic build"
          else
            echo "No Coq files found; skipping"
          fi

  isabelle:
    name: Isabelle hook scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Isabelle placeholder
        run: |
          echo "Official Isabelle setup is environment-specific."
          echo "Add your preferred container or self-hosted runner hook here."
          if find . -name '*.thy' | grep -q .; then
            echo "Isabelle theory files detected"
            find . -name '*.thy' -print
          else
            echo "No Isabelle theory files found; skipping"
          fi
